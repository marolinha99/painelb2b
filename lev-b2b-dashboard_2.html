<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lev B2B — Análise de Crédito</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #0F5A3F;
    --green-mid: #1D9E75;
    --green-light: #8DC15A;
    --green-pale: #EAF3DE;
    --amber-bg: #FAEEDA;
    --amber-text: #854F0B;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --blue-bg: #E6F1FB;
    --blue-text: #185FA5;
    --border: rgba(0,0,0,0.08);
    --border-mid: rgba(0,0,0,0.13);
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --text: #1A1A1A;
    --muted: #6B6B6B;
    --faint: #AAAAAA;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  header {
    background: var(--green-dark);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--green-light);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--green-dark);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green-light);
    display: inline-block;
  }

  /* ── LAYOUT ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* ── METRICS ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    position: relative;
    overflow: hidden;
  }
  .metric::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--green-mid);
    border-radius: 12px 12px 0 0;
  }
  .metric.warn::before { background: #EF9F27; }
  .metric.danger::before { background: #E24B4A; }
  .metric.neutral::before { background: #888780; }
  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .metric-value { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--faint); margin-top: 4px; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .toolbar input[type="text"] {
    flex: 1;
    min-width: 200px;
    height: 38px;
    border: 1px solid var(--border-mid);
    border-radius: 8px;
    padding: 0 12px 0 36px;
    font-family: inherit;
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .toolbar input[type="text"]:focus { border-color: var(--green-mid); }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--faint); font-size: 15px; pointer-events: none; }
  .toolbar select {
    height: 38px;
    border: 1px solid var(--border-mid);
    border-radius: 8px;
    padding: 0 10px;
    font-family: inherit;
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }
  .btn-primary {
    height: 38px;
    padding: 0 16px;
    background: var(--green-dark);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #0a3d2b; }

  /* ── TABLE ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: #FAFAF8; border-bottom: 1px solid var(--border); }
  th {
    padding: 11px 14px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.1s; cursor: pointer; }
  tbody tr:hover td { background: #FAFAF9; }
  tbody tr.vencendo td { background: rgba(250,174,58,0.05); }
  tbody tr.vencida td { background: rgba(226,75,74,0.04); }

  .nome-cell { font-weight: 500; color: var(--text); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cnpj-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .b-aprovado { background: var(--green-pale); color: #3B6D11; }
  .b-analise  { background: var(--blue-bg);   color: var(--blue-text); }
  .b-pendente { background: var(--amber-bg);  color: var(--amber-text); }
  .b-negado   { background: var(--red-bg);    color: var(--red-text); }

  .rating-pill {
    display: inline-flex;
    width: 26px;
    height: 26px;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    font-weight: 600;
    font-size: 12px;
  }
  .r-A { background: var(--green-pale); color: #3B6D11; }
  .r-B { background: var(--blue-bg); color: var(--blue-text); }
  .r-C { background: var(--amber-bg); color: var(--amber-text); }
  .r-D { background: var(--red-bg); color: var(--red-text); }
  .r-empty { background: #F1EFE8; color: var(--faint); }

  .docs-row { display: flex; gap: 3px; align-items: center; }
  .doc-dot {
    width: 9px;
    height: 9px;
    border-radius: 2px;
    background: #E8E6DF;
  }
  .doc-dot.ok { background: var(--green-mid); }
  .doc-dot.pend { background: #EF9F27; }

  .date-warn { color: var(--amber-text); font-weight: 500; }
  .date-over { color: var(--red-text); font-weight: 500; }

  .btn-icon {
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    border-radius: 6px;
    cursor: pointer;
    color: var(--faint);
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }
  .btn-icon:hover { background: var(--bg); color: var(--text); }
  .btn-icon.del:hover { background: var(--red-bg); color: var(--red-text); }

  .empty-row td { text-align: center; padding: 3rem; color: var(--faint); font-size: 13px; }

  /* ── MODAL ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 1rem;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    width: 560px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 1.75rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .modal-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .modal-close {
    width: 30px;
    height: 30px;
    border: none;
    background: var(--bg);
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { background: var(--border); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input,
  .form-group select,
  .form-group textarea {
    height: 38px;
    border: 1px solid var(--border-mid);
    border-radius: 8px;
    padding: 0 10px;
    font-family: inherit;
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--green-mid); }
  .form-group textarea { height: 64px; padding: 8px 10px; resize: none; }

  .docs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .doc-check {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    cursor: pointer;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: all 0.15s;
    user-select: none;
  }
  .doc-check:hover { border-color: var(--green-mid); background: var(--green-pale); }
  .doc-check input { accent-color: var(--green-mid); width: 15px; height: 15px; cursor: pointer; }

  .section-divider {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--faint);
    margin: 1.25rem 0 0.75rem;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    grid-column: 1 / -1;
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .btn-cancel {
    height: 36px;
    padding: 0 14px;
    border: 1px solid var(--border-mid);
    border-radius: 8px;
    background: none;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
  }
  .btn-cancel:hover { background: var(--bg); }
  .btn-save {
    height: 36px;
    padding: 0 18px;
    background: var(--green-dark);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #0a3d2b; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1A1A1A;
    color: white;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--faint);
    font-size: 13px;
  }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--green-mid);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .container { padding: 1rem; }
    header { padding: 0 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">L</div>
    Lev B2B · Crédito
  </div>
  <div class="header-right">
    <span class="status-dot"></span>
    Conectado ao Supabase
  </div>
</header>

<div class="container">

  <div class="metrics" id="metrics">
    <div class="metric neutral"><div class="metric-label">Parceiros</div><div class="metric-value">—</div><div class="metric-sub">carregando…</div></div>
    <div class="metric"><div class="metric-label">Aprovados</div><div class="metric-value">—</div></div>
    <div class="metric warn"><div class="metric-label">Em análise</div><div class="metric-value">—</div></div>
    <div class="metric danger"><div class="metric-label">Revisões</div><div class="metric-value">—</div><div class="metric-sub">vencidas ou próximas</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Buscar por nome ou CNPJ…" oninput="render()" />
    </div>
    <select id="filtStatus" onchange="render()">
      <option value="">Todos os status</option>
      <option>Aprovado</option>
      <option>Em análise</option>
      <option>Pendente</option>
      <option>Negado</option>
    </select>
    <select id="filtConsultor" onchange="render()">
      <option value="">Todos os consultores</option>
      <option>Peterson</option>
      <option>Thadeu</option>
    </select>
    <button class="btn-primary" onclick="openModal()">+ Novo parceiro</button>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:22%">Empresa</th>
          <th style="width:14%">CNPJ</th>
          <th style="width:10%">Consultor</th>
          <th style="width:12%">Status</th>
          <th style="width:7%">Rating</th>
          <th style="width:11%">Limite</th>
          <th style="width:10%">1º Pedido</th>
          <th style="width:9%">Revisão</th>
          <th style="width:8%" title="CNPJ / Contrato / RG / Outros">Docs</th>
          <th style="width:4%"></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="10" class="loading"><div class="spinner"></div><br>Carregando parceiros…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Novo parceiro</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="form-grid">
      <div class="section-divider">Dados da empresa</div>
      <div class="form-group full"><label>Razão social *</label><input id="f-nome" type="text" placeholder="Nome completo da empresa" /></div>
      <div class="form-group"><label>CNPJ</label><input id="f-cnpj" type="text" placeholder="00.000.000/0001-00" /></div>
      <div class="form-group"><label>Consultor</label>
        <select id="f-consultor"><option>Peterson</option><option>Thadeu</option></select>
      </div>

      <div class="section-divider">Análise de crédito</div>
      <div class="form-group"><label>Status</label>
        <select id="f-status">
          <option>Em análise</option><option>Pendente</option><option>Aprovado</option><option>Negado</option>
        </select>
      </div>
      <div class="form-group"><label>Rating</label>
        <select id="f-rating"><option value="">—</option><option>A</option><option>B</option><option>C</option><option>D</option></select>
      </div>
      <div class="form-group"><label>Limite aprovado (R$)</label><input id="f-limite" type="number" min="0" placeholder="0" /></div>
      <div class="form-group"><label>Data da análise</label><input id="f-analise" type="date" /></div>
      <div class="form-group"><label>Próxima revisão</label><input id="f-revisao" type="date" /></div>
      <div class="form-group"><label>1º Pedido realizado</label><input id="f-pedido" type="date" /></div>

      <div class="section-divider">Documentação recebida</div>
      <div class="form-group full">
        <div class="docs-grid">
          <label class="doc-check"><input type="checkbox" id="d-cnpj" /> Cartão CNPJ</label>
          <label class="doc-check"><input type="checkbox" id="d-contrato" /> Contrato Social / MEI</label>
          <label class="doc-check"><input type="checkbox" id="d-rg" /> RG dos Sócios</label>
          <label class="doc-check"><input type="checkbox" id="d-outros" /> Outros documentos</label>
        </div>
      </div>

      <div class="section-divider">Observações</div>
      <div class="form-group full"><label>Notas do FIN</label><textarea id="f-obs" placeholder="Observações internas sobre o parceiro…"></textarea></div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btnSave" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://anjcuhrbambdvgenknzk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFuamN1aHJiYW1iZHZnZW5rbnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjA1MzUsImV4cCI6MjA5NTg5NjUzNX0.KW42pQzmxNCamVAhaOu5fprvnv9woVE5qxffJVrykZo';
const API = `${SUPABASE_URL}/rest/v1/parceiros`;
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

const DOCS_KEYS = ['cnpj','contrato','rg','outros'];
const DOCS_LABELS = ['CNPJ','Contrato','RG','Outros'];

let allData = [];
let editId = null;

async function fetchData() {
  try {
    const res = await fetch(`${API}?order=created_at.desc`, { headers: HEADERS });
    allData = await res.json();
    render();
  } catch(e) {
    toast('Erro ao conectar ao banco. Verifique a tabela no Supabase.', true);
    document.getElementById('tbody').innerHTML = `<tr><td colspan="10" style="text-align:center;padding:2rem;color:#A32D2D">Erro ao carregar dados. Verifique se a tabela foi criada no Supabase.</td></tr>`;
  }
}

function fmt(v) {
  if(!v) return '—';
  return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0}).format(v);
}
function fmtDate(d) {
  if(!d) return '—';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}
function today() {
  const d = new Date(); d.setHours(0,0,0,0); return d;
}
function diffDays(dateStr) {
  if(!dateStr) return null;
  const d = new Date(dateStr+'T00:00:00');
  return Math.round((d - today()) / 86400000);
}

function badgeStatus(s) {
  const map = {Aprovado:'aprovado','Em análise':'analise',Pendente:'pendente',Negado:'negado'};
  return `<span class="badge b-${map[s]||'pendente'}">${s||'—'}</span>`;
}
function ratingPill(r) {
  if(!r) return `<span class="rating-pill r-empty">—</span>`;
  return `<span class="rating-pill r-${r}">${r}</span>`;
}
function docsBar(docs) {
  if(!docs) docs = {};
  return `<div class="docs-row" title="${DOCS_KEYS.map((k,i)=>DOCS_LABELS[i]+': '+(docs[k]?'✓':'✗')).join(' | ')}">${DOCS_KEYS.map(k=>`<div class="doc-dot ${docs[k]?'ok':'pend'}"></div>`).join('')}</div>`;
}
function dateCell(d) {
  const diff = diffDays(d);
  if(diff === null) return '—';
  if(diff < 0) return `<span class="date-over">⚠ ${fmtDate(d)}</span>`;
  if(diff <= 7) return `<span class="date-warn">⚑ ${fmtDate(d)}</span>`;
  return fmtDate(d);
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const fs = document.getElementById('filtStatus').value;
  const fc = document.getElementById('filtConsultor').value;

  let rows = allData.filter(r => {
    if(q && !r.nome?.toLowerCase().includes(q) && !r.cnpj?.toLowerCase().includes(q)) return false;
    if(fs && r.status !== fs) return false;
    if(fc && r.consultor !== fc) return false;
    return true;
  });

  const tbody = document.getElementById('tbody');
  if(!rows.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="10">Nenhum parceiro encontrado.</td></tr>`;
  } else {
    tbody.innerHTML = rows.map(r => {
      const diff = diffDays(r.revisao);
      let cls = '';
      if(diff !== null && diff < 0) cls = 'vencida';
      else if(diff !== null && diff <= 7) cls = 'vencendo';
      return `<tr class="${cls}" onclick="openEdit('${r.id}')">
        <td><div class="nome-cell">${r.nome||'—'}</div></td>
        <td><div class="cnpj-cell">${r.cnpj||'—'}</div></td>
        <td>${r.consultor||'—'}</td>
        <td>${badgeStatus(r.status)}</td>
        <td>${ratingPill(r.rating)}</td>
        <td>${fmt(r.limite)}</td>
        <td>${fmtDate(r.primeiro_pedido)}</td>
        <td>${dateCell(r.revisao)}</td>
        <td>${docsBar(r.docs)}</td>
        <td><button class="btn-icon del" onclick="delRow(event,'${r.id}')" title="Remover">✕</button></td>
      </tr>`;
    }).join('');
  }

  const total = allData.length;
  const aprovados = allData.filter(r=>r.status==='Aprovado').length;
  const emAnalise = allData.filter(r=>r.status==='Em análise'||r.status==='Pendente').length;
  const alertas = allData.filter(r=>{ const d=diffDays(r.revisao); return d!==null&&d<=7; }).length;

  document.getElementById('metrics').innerHTML = `
    <div class="metric neutral">
      <div class="metric-label">Parceiros cadastrados</div>
      <div class="metric-value">${total}</div>
      <div class="metric-sub">canal B2B total</div>
    </div>
    <div class="metric">
      <div class="metric-label">Aprovados</div>
      <div class="metric-value" style="color:#1D9E75">${aprovados}</div>
      <div class="metric-sub">crédito liberado</div>
    </div>
    <div class="metric warn">
      <div class="metric-label">Em análise / pendente</div>
      <div class="metric-value" style="color:#BA7517">${emAnalise}</div>
      <div class="metric-sub">aguardando FIN</div>
    </div>
    <div class="metric danger">
      <div class="metric-label">Revisões próximas</div>
      <div class="metric-value" style="color:#A32D2D">${alertas}</div>
      <div class="metric-sub">≤7 dias ou vencidas</div>
    </div>
  `;
}

function openModal(prefill) {
  editId = prefill?.id || null;
  document.getElementById('modalTitle').textContent = editId ? 'Editar parceiro' : 'Novo parceiro';
  document.getElementById('f-nome').value = prefill?.nome || '';
  document.getElementById('f-cnpj').value = prefill?.cnpj && prefill.cnpj !== '—' ? prefill.cnpj : '';
  document.getElementById('f-consultor').value = prefill?.consultor || 'Peterson';
  document.getElementById('f-status').value = prefill?.status || 'Em análise';
  document.getElementById('f-rating').value = prefill?.rating || '';
  document.getElementById('f-limite').value = prefill?.limite || '';
  document.getElementById('f-analise').value = prefill?.analise || '';
  document.getElementById('f-revisao').value = prefill?.revisao || '';
  document.getElementById('f-pedido').value = prefill?.primeiro_pedido || '';
  document.getElementById('f-obs').value = prefill?.obs || '';
  const docs = prefill?.docs || {};
  DOCS_KEYS.forEach(k => { document.getElementById('d-'+k).checked = docs[k] || false; });
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f-nome').focus();
}
function openEdit(id) {
  const r = allData.find(x=>x.id===id);
  if(r) openModal(r);
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

async function saveModal() {
  const nome = document.getElementById('f-nome').value.trim();
  if(!nome) { alert('Informe a razão social.'); return; }
  const btnSave = document.getElementById('btnSave');
  btnSave.textContent = 'Salvando…'; btnSave.disabled = true;

  const payload = {
    nome,
    cnpj: document.getElementById('f-cnpj').value.trim() || null,
    consultor: document.getElementById('f-consultor').value,
    status: document.getElementById('f-status').value,
    rating: document.getElementById('f-rating').value || null,
    limite: parseFloat(document.getElementById('f-limite').value) || 0,
    analise: document.getElementById('f-analise').value || null,
    revisao: document.getElementById('f-revisao').value || null,
    primeiro_pedido: document.getElementById('f-pedido').value || null,
    obs: document.getElementById('f-obs').value.trim() || null,
    docs: Object.fromEntries(DOCS_KEYS.map(k=>[k, document.getElementById('d-'+k).checked]))
  };

  try {
    if(editId) {
      await fetch(`${API}?id=eq.${editId}`, { method: 'PATCH', headers: HEADERS, body: JSON.stringify(payload) });
      toast('Parceiro atualizado ✓');
    } else {
      await fetch(API, { method: 'POST', headers: HEADERS, body: JSON.stringify(payload) });
      toast('Parceiro cadastrado ✓');
    }
    closeModal();
    await fetchData();
  } catch(e) {
    toast('Erro ao salvar. Tente novamente.', true);
  } finally {
    btnSave.textContent = 'Salvar'; btnSave.disabled = false;
  }
}

async function delRow(e, id) {
  e.stopPropagation();
  if(!confirm('Remover este parceiro? Esta ação não pode ser desfeita.')) return;
  await fetch(`${API}?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
  toast('Parceiro removido.');
  await fetchData();
}

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#A32D2D' : '#1A1A1A';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

fetchData();
</script>
</body>
</html>
